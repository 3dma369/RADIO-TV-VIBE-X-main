name: T.U Security Scan (Firebase-Hosted)

on:
  push:
    branches: [main, security-fix-critical-20260604]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Block on real secret patterns in source
        run: |
          if grep -rE "sk_live_[0-9a-zA-Z]{24,}|AKIA[0-9A-Z]{16}|ghp_[0-9a-zA-Z]{36}" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.git .; then
            echo "::error::Real secret pattern detected in source. Move to ~/.tangible-union-secrets/ and use env."
            exit 1
          fi

      - name: Block on Vercel artifacts (T.U is Firebase-Hosted, except PnI)
        run: |
          # The ONLY T.U project that uses Vercel is price-n-inventory.
          # All other T.U apps (this workflow's target) are Firebase-Hosted.
          # See /Users/333e/.fleet-mesh/VERCEL_DOCTRINE.md
          if [ -f "vercel.json" ]; then
            echo "::error::vercel.json should not exist in a Firebase-hosted T.U project."
            echo "::error::Only price-n-inventory uses Vercel. See VERCEL_DOCTRINE.md"
            exit 1
          fi
          if [ -d ".vercel" ]; then
            echo "::error::.vercel/ scaffold should not exist in a Firebase-hosted T.U project."
            echo "::error::Only price-n-inventory uses Vercel. See VERCEL_DOCTRINE.md"
            exit 1
          fi
          echo "✅ No Vercel artifacts (correct for Firebase-hosted app)"

      - name: Verify firebase.json has security headers
        run: |
          if [ ! -f "firebase.json" ]; then
            echo "::error::firebase.json is missing. This should be a Firebase-hosted app."
            exit 1
          fi
          missing=""
          for h in "Strict-Transport-Security" "X-Content-Type-Options" "X-Frame-Options"; do
            if ! grep -q "$h" firebase.json; then
              missing="$missing $h"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::firebase.json is missing security headers:$missing"
            exit 1
          fi
          echo "✅ firebase.json has all 3 required security headers"
